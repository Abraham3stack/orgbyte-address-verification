openapi: 3.1.0
info:
  title: Address Verification Service API
  version: 1.0.0
  summary: Contract for asynchronous mock address verification sessions
  description: |
    API-first contract for the OrgByte Address Verification assessment.

    Scope constraints:
    - Exactly three endpoints
    - Mock asynchronous workflow only
    - No auth, database, external provider, queues, or WebSockets
servers:
  - url: http://localhost:4000
    description: Local mock API server

tags:
  - name: Verification
    description: Session lifecycle, status polling, and final result retrieval

paths:
  /verify/initiate:
    post:
      tags: [Verification]
      operationId: initiateVerification
      summary: Initiate address verification
      description: |
        Creates a verification session and returns 202 Accepted.

        Input normalization:
        - Trim leading/trailing whitespace on all string fields
        - Collapse repeated internal whitespace to a single space
        - Normalize countryCode to uppercase (lowercase and mixed case accepted)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressInput'
            examples:
              initiateRequest:
                summary: Valid initiate request with optional international fields omitted
                value:
                  addressLine1: 12 Marina Road
                  city: Lagos
                  countryCode: ng
      responses:
        '202':
          $ref: '#/components/responses/InitiateAccepted'
        '400':
          $ref: '#/components/responses/InvalidRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /verify/status/{sessionId}:
    get:
      tags: [Verification]
      operationId: getVerificationStatus
      summary: Get verification session status
      description: |
        Returns deterministic session processing state based on elapsed time.

        Session processing states:
        - PENDING
        - PROCESSING
        - COMPLETED
        - FAILED
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          $ref: '#/components/responses/StatusSuccess'
        '400':
          $ref: '#/components/responses/InvalidSessionId'
        '404':
          $ref: '#/components/responses/UnknownSession'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /verify/result/{sessionId}:
    get:
      tags: [Verification]
      operationId: getVerificationResult
      summary: Get final verification result
      description: |
        Returns final result only when session state is COMPLETED.

        Important distinction:
        - Session state models processing lifecycle
        - Verdict models address verification outcome and is only present when state is COMPLETED
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          $ref: '#/components/responses/ResultSuccess'
        '400':
          $ref: '#/components/responses/InvalidSessionId'
        '404':
          $ref: '#/components/responses/UnknownSession'
        '409':
          $ref: '#/components/responses/ResultUnavailable'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      description: UUID v4 verification session identifier
      schema:
        type: string
        format: uuid
        pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'
      example: 7f9e8cbe-7b5f-4f5d-9db6-9e4865f8a4c1

  responses:
    InitiateAccepted:
      description: Session accepted for asynchronous processing
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/InitiateSuccessResponse'
          examples:
            initiateSuccess:
              summary: Initiate success
              value:
                success: true
                data:
                  sessionId: 7f9e8cbe-7b5f-4f5d-9db6-9e4865f8a4c1
                  status: PENDING
                  createdAt: '2026-07-22T10:00:00.000Z'
                  pollAfterMs: 1500
                error: null
                meta:
                  requestId: req_01J7KPV80Q2X4K1T2M7S9R8ABC
                  timestamp: '2026-07-22T10:00:00.003Z'

    StatusSuccess:
      description: Current deterministic session status
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StatusSuccessResponse'
          examples:
            pending:
              summary: PENDING status
              value:
                success: true
                data:
                  sessionId: 11111111-1111-4111-8111-111111111111
                  status: PENDING
                  createdAt: '2026-07-22T10:00:00.000Z'
                  updatedAt: '2026-07-22T10:00:01.000Z'
                  isTerminal: false
                  progressPercent: 25
                  nextPollAfterMs: 1500
                error: null
                meta:
                  requestId: req_01J7KPVA0M0P3R4S5T6U7V8W9X
                  timestamp: '2026-07-22T10:00:01.001Z'
            processing:
              summary: PROCESSING status
              value:
                success: true
                data:
                  sessionId: 22222222-2222-4222-8222-222222222222
                  status: PROCESSING
                  createdAt: '2026-07-22T10:00:00.000Z'
                  updatedAt: '2026-07-22T10:00:03.500Z'
                  isTerminal: false
                  progressPercent: 65
                  nextPollAfterMs: 1500
                error: null
                meta:
                  requestId: req_01J7KPVAS5Y6Z7A8B9C0D1E2F3
                  timestamp: '2026-07-22T10:00:03.501Z'
            completed:
              summary: COMPLETED status
              value:
                success: true
                data:
                  sessionId: 33333333-3333-4333-8333-333333333333
                  status: COMPLETED
                  createdAt: '2026-07-22T10:00:00.000Z'
                  updatedAt: '2026-07-22T10:00:08.000Z'
                  isTerminal: true
                  progressPercent: 100
                  nextPollAfterMs: null
                error: null
                meta:
                  requestId: req_01J7KPVB3H4J5K6L7M8N9P0Q1R
                  timestamp: '2026-07-22T10:00:08.001Z'
            failed:
              summary: FAILED status
              value:
                success: true
                data:
                  sessionId: 44444444-4444-4444-8444-444444444444
                  status: FAILED
                  createdAt: '2026-07-22T10:00:00.000Z'
                  updatedAt: '2026-07-22T10:00:06.100Z'
                  isTerminal: true
                  progressPercent: 100
                  nextPollAfterMs: null
                error: null
                meta:
                  requestId: req_01J7KPVBC2D3E4F5G6H7J8K9L0
                  timestamp: '2026-07-22T10:00:06.101Z'

    ResultSuccess:
      description: Final verification result for COMPLETED sessions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResultSuccessResponse'
          examples:
            verified:
              summary: Completed result with VERIFIED verdict
              value:
                success: true
                data:
                  sessionId: 55555555-5555-4555-8555-555555555555
                  status: COMPLETED
                  verdict: VERIFIED
                  completedAt: '2026-07-22T10:00:08.000Z'
                  normalizedAddress:
                    addressLine1: 12 Marina Road
                    city: Lagos
                    countryCode: NG
                    formattedAddress: 12 Marina Road, Lagos, NG
                  confidenceScore: 0.85
                  checks:
                    addressLine1Valid: true
                    postalCodeValid: true
                    cityStateMatch: true
                    countrySupported: true
                  issues: []
                error: null
                meta:
                  requestId: req_01J7KPVC7R8S9T0U1V2W3X4Y5Z
                  timestamp: '2026-07-22T10:00:08.010Z'
            partiallyVerified:
              summary: Completed result with PARTIALLY_VERIFIED verdict
              value:
                success: true
                data:
                  sessionId: 66666666-6666-4666-8666-666666666666
                  status: COMPLETED
                  verdict: PARTIALLY_VERIFIED
                  completedAt: '2026-07-22T10:00:08.000Z'
                  normalizedAddress:
                    addressLine1: 200 King Street
                    addressLine2: Unit 4
                    city: Toronto
                    state: ON
                    postalCode: M5H 1J9
                    countryCode: CA
                    formattedAddress: 200 King Street, Unit 4, Toronto, ON, M5H 1J9, CA
                  confidenceScore: 0.78
                  checks:
                    addressLine1Valid: true
                    postalCodeValid: true
                    cityStateMatch: true
                    countrySupported: true
                  issues: []
                error: null
                meta:
                  requestId: req_01J7KPVCM9N0P1Q2R3S4T5U6V7
                  timestamp: '2026-07-22T10:00:08.011Z'
            unverified:
              summary: Completed result with UNVERIFIED verdict
              value:
                success: true
                data:
                  sessionId: 77777777-7777-4777-8777-777777777777
                  status: COMPLETED
                  verdict: UNVERIFIED
                  completedAt: '2026-07-22T10:00:08.000Z'
                  normalizedAddress:
                    addressLine1: 1 Mock Failure Way
                    city: Austin
                    state: TX
                    postalCode: '73301'
                    countryCode: US
                    formattedAddress: 1 Mock Failure Way, Austin, TX, 73301, US
                  confidenceScore: 0.73
                  checks:
                    addressLine1Valid: true
                    postalCodeValid: true
                    cityStateMatch: true
                    countrySupported: true
                  issues: []
                error: null
                meta:
                  requestId: req_01J7KPVD2A3B4C5D6E7F8G9H0J
                  timestamp: '2026-07-22T10:00:08.012Z'

    InvalidRequest:
      description: Request body is malformed or fails validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidRequest:
              summary: Invalid initiate request
              value:
                success: false
                data: null
                error:
                  code: INVALID_REQUEST
                  message: Request validation failed
                  details:
                    - field: countryCode
                      issue: Must be a 2-letter country code
                meta:
                  requestId: req_01J7KPVDN1P2Q3R4S5T6U7V8W9
                  timestamp: '2026-07-22T10:00:00.100Z'

    InvalidSessionId:
      description: Session ID format is invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidSessionId:
              summary: Invalid sessionId path parameter
              value:
                success: false
                data: null
                error:
                  code: INVALID_SESSION_ID
                  message: sessionId must be a valid UUID v4
                meta:
                  requestId: req_01J7KPVE6R7S8T9U0V1W2X3Y4Z
                  timestamp: '2026-07-22T10:01:00.000Z'

    UnknownSession:
      description: Session was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unknownSession:
              summary: Unknown session
              value:
                success: false
                data: null
                error:
                  code: SESSION_NOT_FOUND
                  message: No verification session exists for the provided sessionId
                meta:
                  requestId: req_01J7KPVEJ1K2L3M4N5P6Q7R8S9
                  timestamp: '2026-07-22T10:01:10.000Z'

    ResultUnavailable:
      description: Result cannot be returned because session is not completed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            resultNotReady:
              summary: Result is not ready
              value:
                success: false
                data: null
                error:
                  code: RESULT_NOT_READY
                  message: Verification is still in progress
                meta:
                  requestId: req_01J7KPVF3A4B5C6D7E8F9G0H1J
                  timestamp: '2026-07-22T10:01:20.000Z'
            processingFailed:
              summary: Processing failed before completion
              value:
                success: false
                data: null
                error:
                  code: PROCESSING_FAILED
                  message: Verification processing failed and no final result is available
                meta:
                  requestId: req_01J7KPVFM1N2P3Q4R5S6T7U8V9
                  timestamp: '2026-07-22T10:01:25.000Z'

    InternalServerError:
      description: Unexpected server failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internalError:
              summary: Internal server error
              value:
                success: false
                data: null
                error:
                  code: INTERNAL_SERVER_ERROR
                  message: An unexpected error occurred
                meta:
                  requestId: req_01J7KPVG7R8S9T0U1V2W3X4Y5Z
                  timestamp: '2026-07-22T10:02:00.000Z'

  schemas:
    SessionState:
      type: string
      enum: [PENDING, PROCESSING, COMPLETED, FAILED]

    VerificationVerdict:
      type: string
      enum: [VERIFIED, PARTIALLY_VERIFIED, UNVERIFIED]

    Severity:
      type: string
      enum: [info, warning, error]

    AddressInput:
      type: object
      additionalProperties: false
      required:
        - addressLine1
        - city
        - countryCode
      properties:
        addressLine1:
          type: string
          minLength: 1
          maxLength: 120
        addressLine2:
          type: string
          minLength: 1
          maxLength: 120
        city:
          type: string
          minLength: 1
          maxLength: 80
        state:
          type: string
          minLength: 2
          maxLength: 80
        postalCode:
          type: string
          minLength: 3
          maxLength: 20
        countryCode:
          type: string
          pattern: '^[A-Za-z]{2}$'
          description: Two-letter ISO-3166 alpha-2 code. Input is normalized to uppercase.

    Meta:
      type: object
      additionalProperties: false
      required: [requestId, timestamp]
      properties:
        requestId:
          type: string
        timestamp:
          type: string
          format: date-time

    ErrorObject:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
              items:
                type: object
                additionalProperties: true

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [success, data, error, meta]
      properties:
        success:
          type: boolean
          const: false
        data:
          type: 'null'
        error:
          $ref: '#/components/schemas/ErrorObject'
        meta:
          $ref: '#/components/schemas/Meta'

    InitiateData:
      type: object
      additionalProperties: false
      required: [sessionId, status, createdAt, pollAfterMs]
      properties:
        sessionId:
          type: string
          format: uuid
          pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'
        status:
          allOf:
            - $ref: '#/components/schemas/SessionState'
            - const: PENDING
        createdAt:
          type: string
          format: date-time
        pollAfterMs:
          type: integer
          minimum: 1

    InitiateSuccessResponse:
      type: object
      additionalProperties: false
      required: [success, data, error, meta]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/InitiateData'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'

    StatusData:
      type: object
      additionalProperties: false
      required:
        - sessionId
        - status
        - createdAt
        - updatedAt
        - isTerminal
        - progressPercent
        - nextPollAfterMs
      properties:
        sessionId:
          type: string
          format: uuid
          pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'
        status:
          $ref: '#/components/schemas/SessionState'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        isTerminal:
          type: boolean
        progressPercent:
          type: integer
          enum: [25, 65, 100]
        nextPollAfterMs:
          anyOf:
            - type: integer
              minimum: 1
            - type: 'null'

    StatusSuccessResponse:
      type: object
      additionalProperties: false
      required: [success, data, error, meta]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/StatusData'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'

    NormalizedAddress:
      type: object
      additionalProperties: false
      required:
        - addressLine1
        - city
        - countryCode
        - formattedAddress
      properties:
        addressLine1:
          type: string
        addressLine2:
          type: string
        city:
          type: string
        state:
          type: string
        postalCode:
          type: string
        countryCode:
          type: string
          pattern: '^[A-Z]{2}$'
        formattedAddress:
          type: string

    CheckResults:
      type: object
      additionalProperties: false
      required: [addressLine1Valid, postalCodeValid, cityStateMatch, countrySupported]
      properties:
        addressLine1Valid:
          type: boolean
        postalCodeValid:
          type: boolean
        cityStateMatch:
          type: boolean
        countrySupported:
          type: boolean

    Issue:
      type: object
      additionalProperties: false
      required: [code, message, severity]
      properties:
        code:
          type: string
        message:
          type: string
        severity:
          $ref: '#/components/schemas/Severity'

    ResultData:
      type: object
      additionalProperties: false
      required:
        - sessionId
        - status
        - verdict
        - completedAt
        - normalizedAddress
        - confidenceScore
        - checks
        - issues
      properties:
        sessionId:
          type: string
          format: uuid
          pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'
        status:
          allOf:
            - $ref: '#/components/schemas/SessionState'
            - const: COMPLETED
        verdict:
          $ref: '#/components/schemas/VerificationVerdict'
        completedAt:
          type: string
          format: date-time
        normalizedAddress:
          $ref: '#/components/schemas/NormalizedAddress'
        confidenceScore:
          type: number
          minimum: 0
          maximum: 1
        checks:
          $ref: '#/components/schemas/CheckResults'
        issues:
          type: array
          items:
            $ref: '#/components/schemas/Issue'

    ResultSuccessResponse:
      type: object
      additionalProperties: false
      required: [success, data, error, meta]
      properties:
        success:
          type: boolean
          const: true
        data:
          $ref: '#/components/schemas/ResultData'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
